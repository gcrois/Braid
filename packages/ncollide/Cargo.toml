[package]
name = "ncollide-wasm"
version = "0.1.0"
edition = "2018"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
ncollide2d = { version = "0.33", features = ["dim2"] }
nalgebra = { version = "0.30.1", features = ["std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.5"
js-sys = "0.3"
log = "0.4"
web-sys = { version = "0.3", features = ["console"] }